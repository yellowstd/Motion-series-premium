<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Invitation</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{
            width:100%;
            height:100%;
            background:#000;
            overflow:hidden;
            font-family:Arial, sans-serif;
        }

        /* COVER */

        #cover{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
            transition:.8s ease;
        }

        #cover.hide{
            opacity:0;
            visibility:hidden;
        }

        /* BUTTON OPEN */

        #openBtn{
            padding:14px 32px;
            border:none;
            border-radius:50px;
            background:#fff;
            color:#000;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        #openBtn:active{
            transform:scale(.95);
        }

        /* VIDEO */

        #video{
            width:100vw;
            height:100vh;
            object-fit:contain;
            display:block;
            background:#000;
        }

        /* MUSIC BUTTON */

        #musicBtn{
            position:fixed;
            right:20px;
            bottom:20px;

            width:55px;
            height:55px;

            border:none;
            border-radius:50%;

            background:rgba(255,255,255,.15);
            backdrop-filter:blur(10px);

            color:#fff;
            font-size:20px;

            cursor:pointer;

            display:none;

            z-index:999;
        }

        #musicBtn.playing{
            animation:spin 4s linear infinite;
        }

        @keyframes spin{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }

        }

    </style>
</head>
<body>

    <!-- COVER -->

    <div id="cover">

        <button id="openBtn">
            Buka Undangan
        </button>

    </div>

    <!-- VIDEO -->

    <video
        id="video"
        playsinline
        preload="auto">

        <source src="video.mp4" type="video/mp4">

    </video>

    <!-- MUSIC -->

    <audio id="music" loop>

        <source src="backsound.mp3" type="audio/mpeg">

    </audio>

    <!-- MUSIC CONTROL -->

    <button id="musicBtn">
        ♪
    </button>

    <script>

        const cover = document.getElementById('cover');
        const openBtn = document.getElementById('openBtn');

        const video = document.getElementById('video');
        const music = document.getElementById('music');

        const musicBtn = document.getElementById('musicBtn');

        openBtn.addEventListener('click', async ()=>{

            cover.classList.add('hide');

            try{
                await video.play();
            }catch(err){
                console.log(err);
            }

            try{
                await music.play();

                musicBtn.style.display='block';
                musicBtn.classList.add('playing');

            }catch(err){
                console.log(err);
            }

        });

        musicBtn.addEventListener('click',()=>{

            if(music.paused){

                music.play();
                musicBtn.classList.add('playing');

            }else{

                music.pause();
                musicBtn.classList.remove('playing');

            }

        });

        video.addEventListener('ended',()=>{

            video.currentTime = 0;
            video.play();

        });

    </script>

</body>
</html>
